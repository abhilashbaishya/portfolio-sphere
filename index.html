<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selected Works — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0e0e0e;
      color: #f0f0f0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
      -webkit-user-select: none;
    }

    .header {
      position: fixed;
      top: 40px;
      left: 50px;
      z-index: 10;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }

    .view-modes {
      position: fixed;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
      background: rgba(255,255,255,0.06);
      padding: 4px;
      border-radius: 28px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .view-modes button {
      padding: 7px 20px;
      border-radius: 22px;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      color: rgba(255,255,255,0.5);
    }

    .view-modes button.active {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }

    .view-modes button:hover:not(.active) {
      color: rgba(255,255,255,0.8);
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    .footer {
      position: fixed;
      bottom: 40px;
      left: 50px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      z-index: 10;
    }

    .counter {
      position: fixed;
      bottom: 40px;
      right: 50px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      z-index: 10;
      font-variant-numeric: tabular-nums;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .lightbox.active { display: flex; opacity: 1; }
    .lightbox img {
      max-width: 80vw;
      max-height: 80vh;
      border-radius: 0;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    .lightbox-close {
      position: absolute;
      top: 30px; right: 40px;
      color: #fff; font-size: 24px;
      cursor: pointer; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      transition: background 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.16); }

  </style>
</head>
<body>

  <div class="header">Selected Works</div>

  <div class="view-modes">
    <button data-mode="flat">Flat</button>
    <button data-mode="tilt">Tilt</button>
    <button class="active" data-mode="ring">Ring</button>
  </div>

  <canvas id="canvas"></canvas>

  <div class="footer">Scroll to explore</div>
  <div class="counter" id="counter">01 — 12</div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">&#x2715;</div>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    // =============================================
    // CONFIGURATION — Add your images here
    // =============================================
    const items = [
      { src: 'images/01.webp', title: 'Project 01' },
      { src: 'images/02.webp', title: 'Project 02' },
      { src: 'images/03.webp', title: 'Project 03' },
      { src: 'images/04.webp', title: 'Project 04' },
      { src: 'images/05.webp', title: 'Project 05' },
      { src: 'images/06.webp', title: 'Project 06' },
      { src: 'images/07.webp', title: 'Project 07' },
      { src: 'images/08.webp', title: 'Project 08' },
      { src: 'images/09.webp', title: 'Project 09' },
      { src: 'images/10.webp', title: 'Project 10' },
      { src: 'images/11.webp', title: 'Project 11' },
      { src: 'images/12.webp', title: 'Project 12' },
    ];
    // =============================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const counterEl = document.getElementById('counter');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    const N = items.length;
    const DPR = window.devicePixelRatio || 1;

    // Card dimensions
    const CARD_W = 140;
    const CARD_H = 175;
    const CARD_R = 0;

    // Rive-matched parameters
    const PERSP_DIST = 1549;
    const SPIN_SPEED = 10; // degrees per second

    // Ring radius — fills most of the viewport
    let RING_RADIUS = 0;

    // Mode tilt angles (degrees around X axis)
    // -90 = face-on circle, 0 = edge-on line
    const MODE_TILT = {
      flat:  { x: -80 },   // near face-on circle (like reference Flat)
      tilt:  { x: -50 },   // angled view
      ring:  { x: -40 },   // tilted diagonal ellipse (like reference Ring)
    };

    let currentMode = 'ring';
    let currentTiltX = -40;
    let targetTiltX = -40;

    // Spin angle (Y rotation of the ring)
    let spinAngle = 0; // degrees

    // Mouse state
    let mouseX = -9999, mouseY = -9999;
    let isHovering = false;      // mouse is on canvas
    let isHoveringCard = false;  // mouse is over a card

    // Image loading
    const loadedImages = [];
    items.forEach((item, i) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = item.src;
      loadedImages[i] = img;
    });

    // Resize
    function resize() {
      canvas.width = window.innerWidth * DPR;
      canvas.height = window.innerHeight * DPR;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      RING_RADIUS = Math.min(window.innerWidth, window.innerHeight) * 0.4;
    }
    resize();
    window.addEventListener('resize', resize);

    // Deg to rad
    const RAD = Math.PI / 180;

    // 3D helpers
    function rotateX(p, deg) {
      const c = Math.cos(deg * RAD), s = Math.sin(deg * RAD);
      return { x: p.x, y: p.y * c - p.z * s, z: p.y * s + p.z * c };
    }

    function rotateY(p, deg) {
      const c = Math.cos(deg * RAD), s = Math.sin(deg * RAD);
      return { x: p.x * c + p.z * s, y: p.y, z: -p.x * s + p.z * c };
    }

    // Perspective project
    function project(p, cx, cy) {
      const scale = PERSP_DIST / (PERSP_DIST + p.z);
      return {
        sx: cx + p.x * scale,
        sy: cy + p.y * scale,
        scale: scale,
        z: p.z
      };
    }

    // Draw rounded rect path
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    // Scroll interaction
    let scrollVel = 0;
    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      scrollVel += e.deltaY * 0.05;
    }, { passive: false });

    // Mouse tracking
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      isHovering = true;
    });

    canvas.addEventListener('mouseleave', () => {
      isHovering = false;
      mouseX = -9999;
      mouseY = -9999;
    });

    // Click detection
    let projectedCards = [];
    canvas.addEventListener('click', (e) => {
      const mx = e.clientX, my = e.clientY;
      // Find topmost card under click
      for (let i = projectedCards.length - 1; i >= 0; i--) {
        const c = projectedCards[i];
        const hw = c.w / 2, hh = c.h / 2;
        if (mx >= c.sx - hw && mx <= c.sx + hw && my >= c.sy - hh && my <= c.sy + hh) {
          openLightbox(items[c.idx]);
          break;
        }
      }
    });

    // View modes
    document.querySelectorAll('.view-modes button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.view-modes .active').classList.remove('active');
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        targetTiltX = MODE_TILT[currentMode].x;
      });
    });

    // Lightbox
    function openLightbox(item) {
      if (!item.src) return;
      lightboxImg.src = item.src;
      lightbox.classList.add('active');
    }
    function closeLightbox() {
      lightbox.classList.remove('active');
    }
    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

    // Last timestamp for delta time
    let lastTime = performance.now();

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05); // seconds, capped
      lastTime = now;

      const W = window.innerWidth;
      const H = window.innerHeight;
      const cx = W / 2;
      const cy = H / 2;

      // Auto-spin — only pauses when hovering over a card
      if (!isHoveringCard) {
        spinAngle += SPIN_SPEED * dt;
      }

      // Add scroll velocity
      spinAngle += scrollVel;
      scrollVel *= 0.94; // friction (smoother deceleration)

      // Smooth tilt transition
      currentTiltX += (targetTiltX - currentTiltX) * 0.08;

      // Clear
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.clearRect(0, 0, W, H);

      // Compute card positions
      const cards = [];
      for (let i = 0; i < N; i++) {
        const angle = (360 / N) * i + spinAngle;

        // Position on the ring (in XZ plane)
        let p = {
          x: Math.cos(angle * RAD) * RING_RADIUS,
          y: 0,
          z: Math.sin(angle * RAD) * RING_RADIUS
        };

        // Tilt the ring around X axis
        p = rotateX(p, currentTiltX);

        // Project to screen
        const proj = project(p, cx, cy);

        // Card size with perspective
        const cardW = CARD_W * proj.scale;
        const cardH = CARD_H * proj.scale;

        cards.push({
          idx: i,
          sx: proj.sx,
          sy: proj.sy,
          w: cardW,
          h: cardH,
          scale: proj.scale,
          z: p.z,
          angle: angle
        });
      }

      // Sort back to front (higher z = further back)
      cards.sort((a, b) => a.z - b.z);

      // Store for click detection
      projectedCards = cards;

      // Determine which card is hovered (front-to-back)
      let hoveredIdx = -1;
      if (isHovering) {
        for (let i = cards.length - 1; i >= 0; i--) {
          const c = cards[i];
          const hw = c.w / 2, hh = c.h / 2;
          if (mouseX >= c.sx - hw && mouseX <= c.sx + hw && mouseY >= c.sy - hh && mouseY <= c.sy + hh) {
            hoveredIdx = i;
            break;
          }
        }
      }
      isHoveringCard = hoveredIdx !== -1;

      // Draw cards
      for (let ci = 0; ci < cards.length; ci++) {
        const card = cards[ci];
        const x = card.sx - card.w / 2;
        const y = card.sy - card.h / 2;

        // Depth-based opacity
        const depthNorm = (card.z + RING_RADIUS) / (2 * RING_RADIUS); // 0 (front) to 1 (back)
        let alpha = 1.0 - depthNorm * 0.55; // front: 1.0, back: 0.45

        // Hover dimming: if any card is hovered, dim all others
        if (hoveredIdx !== -1 && ci !== hoveredIdx) {
          alpha *= 0.35;
        }

        ctx.save();
        ctx.globalAlpha = alpha;

        // Shadow — deeper on dark bg
        const shadowAlpha = 0.3 + (1 - depthNorm) * 0.4;
        ctx.shadowColor = `rgba(0,0,0,${shadowAlpha})`;
        ctx.shadowBlur = 24 * card.scale;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 8 * card.scale;

        // Card background
        roundRect(x, y, card.w, card.h, CARD_R * card.scale);
        ctx.fillStyle = '#1a1a1a';
        ctx.fill();

        // Subtle border
        ctx.strokeStyle = `rgba(255,255,255,${0.04 + (1 - depthNorm) * 0.06})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        // Reset shadow for image
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;

        // Clip and draw image
        ctx.save();
        roundRect(x, y, card.w, card.h, CARD_R * card.scale);
        ctx.clip();

        const img = loadedImages[card.idx];
        if (img && img.complete && img.naturalWidth > 0) {
          // Cover fit
          const imgR = img.naturalWidth / img.naturalHeight;
          const cardR = card.w / card.h;
          let sw, sh, sx, sy;
          if (imgR > cardR) {
            sh = img.naturalHeight;
            sw = sh * cardR;
            sx = (img.naturalWidth - sw) / 2;
            sy = 0;
          } else {
            sw = img.naturalWidth;
            sh = sw / cardR;
            sx = 0;
            sy = (img.naturalHeight - sh) / 2;
          }
          ctx.drawImage(img, sx, sy, sw, sh, x, y, card.w, card.h);
        } else {
          // Placeholder
          ctx.fillStyle = '#222';
          ctx.fill();
          ctx.fillStyle = '#555';
          ctx.font = `${Math.round(10 * card.scale)}px Inter, sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(items[card.idx].title, card.sx, card.sy + 10 * card.scale);

          // Plus icon
          ctx.strokeStyle = '#555';
          ctx.lineWidth = 1.5 * card.scale;
          const s = 12 * card.scale;
          ctx.beginPath();
          ctx.moveTo(card.sx - s / 2, card.sy - 6 * card.scale);
          ctx.lineTo(card.sx + s / 2, card.sy - 6 * card.scale);
          ctx.moveTo(card.sx, card.sy - 6 * card.scale - s / 2);
          ctx.lineTo(card.sx, card.sy - 6 * card.scale + s / 2);
          ctx.stroke();
        }

        ctx.restore(); // clip
        ctx.restore(); // alpha + shadow
      }

      canvas.style.cursor = isHoveringCard ? 'pointer' : 'default';

      // Update counter — front-most card
      const front = cards[cards.length - 1];
      if (front) {
        const disp = String(front.idx + 1).padStart(2, '0');
        counterEl.textContent = `${disp} — ${String(N).padStart(2, '0')}`;
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
