<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selected Works — Portfolio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #e8e8e8;
      color: #111;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
      -webkit-user-select: none;
    }

    .header {
      position: fixed;
      top: 40px;
      left: 50px;
      z-index: 10;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .view-modes {
      position: fixed;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .view-modes button {
      padding: 8px 20px;
      border-radius: 24px;
      border: 1.5px solid #bbb;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #333;
    }

    .view-modes button.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .view-modes button:hover:not(.active) {
      background: #ddd;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    .footer {
      position: fixed;
      bottom: 40px;
      left: 50px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
      z-index: 10;
    }

    .counter {
      position: fixed;
      bottom: 40px;
      right: 50px;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      z-index: 10;
      font-variant-numeric: tabular-nums;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .lightbox.active { display: flex; opacity: 1; }
    .lightbox img {
      max-width: 80vw;
      max-height: 80vh;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: absolute;
      top: 30px; right: 40px;
      color: #fff; font-size: 28px;
      cursor: pointer; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: background 0.2s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.2); }

    /* Gallery overlay */
    .gallery-overlay {
      position: fixed;
      inset: 0;
      background: #e8e8e8;
      z-index: 50;
      display: none;
      overflow-y: auto;
      padding: 120px 40px 80px;
    }
    .gallery-overlay.active { display: block; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .gallery-item {
      aspect-ratio: 3/4;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .gallery-item .placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
      color: #999; font-size: 11px; font-weight: 500; gap: 6px;
    }
    .placeholder-icon {
      width: 30px; height: 30px;
      border: 2px dashed #ccc; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #ccc;
    }
  </style>
</head>
<body>

  <div class="header">Selected Works</div>

  <div class="view-modes">
    <button data-mode="flat">Flat</button>
    <button data-mode="tilt">Tilt</button>
    <button class="active" data-mode="ring">Ring</button>
    <button data-mode="gallery">Gallery</button>
  </div>

  <canvas id="canvas"></canvas>

  <div class="gallery-overlay" id="galleryOverlay">
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>

  <div class="footer">Scroll to explore</div>
  <div class="counter" id="counter">01 — 08</div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">&#x2715;</div>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    // =============================================
    // CONFIGURATION — Add your images here
    // =============================================
    const items = [
      { src: 'images/01.jpg', title: 'Project 01' },
      { src: 'images/02.jpg', title: 'Project 02' },
      { src: 'images/03.jpg', title: 'Project 03' },
      { src: 'images/04.jpg', title: 'Project 04' },
      { src: 'images/05.jpg', title: 'Project 05' },
      { src: 'images/06.jpg', title: 'Project 06' },
      { src: 'images/07.jpg', title: 'Project 07' },
      { src: 'images/08.jpg', title: 'Project 08' },
    ];
    // =============================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const counterEl = document.getElementById('counter');
    const galleryOverlay = document.getElementById('galleryOverlay');
    const galleryGrid = document.getElementById('galleryGrid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    const N = items.length;
    const DPR = window.devicePixelRatio || 1;

    // Card dimensions
    const CARD_W = 130;
    const CARD_H = 162;
    const CARD_R = 5;

    // Rive-matched parameters
    const PERSP_DIST = 1549;
    const PUSH_RADIUS = 253;
    const PUSH_STRENGTH = 80;
    const SPIN_SPEED = 10; // degrees per second

    // Ring radius — fills most of the viewport
    let RING_RADIUS = 0;

    // Mode tilt angles (degrees around X axis)
    // tiltX: -90 = face-on circle, 0 = edge-on line
    const MODE_TILT = {
      flat:  { x: -15 },   // top-down spread
      tilt:  { x: -50 },   // angled view
      ring:  { x: -80 },   // nearly face-on circle
    };

    let currentMode = 'ring';
    let currentTiltX = -80;
    let targetTiltX = -80;

    // Spin angle (Y rotation of the ring)
    let spinAngle = 0; // degrees

    // Mouse state
    let mouseX = -9999, mouseY = -9999;
    let isHovering = false;

    // Image loading
    const loadedImages = [];
    items.forEach((item, i) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = item.src;
      loadedImages[i] = img;
    });

    // Resize
    function resize() {
      canvas.width = window.innerWidth * DPR;
      canvas.height = window.innerHeight * DPR;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      RING_RADIUS = Math.min(window.innerWidth, window.innerHeight) * 0.4;
    }
    resize();
    window.addEventListener('resize', resize);

    // Deg to rad
    const RAD = Math.PI / 180;

    // 3D helpers
    function rotateX(p, deg) {
      const c = Math.cos(deg * RAD), s = Math.sin(deg * RAD);
      return { x: p.x, y: p.y * c - p.z * s, z: p.y * s + p.z * c };
    }

    function rotateY(p, deg) {
      const c = Math.cos(deg * RAD), s = Math.sin(deg * RAD);
      return { x: p.x * c + p.z * s, y: p.y, z: -p.x * s + p.z * c };
    }

    // Perspective project
    function project(p, cx, cy) {
      const scale = PERSP_DIST / (PERSP_DIST + p.z);
      return {
        sx: cx + p.x * scale,
        sy: cy + p.y * scale,
        scale: scale,
        z: p.z
      };
    }

    // Draw rounded rect path
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    // Scroll interaction
    let scrollVel = 0;
    window.addEventListener('wheel', (e) => {
      if (currentMode === 'gallery') return;
      e.preventDefault();
      scrollVel += e.deltaY * 0.05;
    }, { passive: false });

    // Mouse tracking
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      isHovering = true;
    });

    canvas.addEventListener('mouseleave', () => {
      isHovering = false;
      mouseX = -9999;
      mouseY = -9999;
    });

    // Click detection
    let projectedCards = [];
    canvas.addEventListener('click', (e) => {
      const mx = e.clientX, my = e.clientY;
      // Find topmost card under click
      for (let i = projectedCards.length - 1; i >= 0; i--) {
        const c = projectedCards[i];
        const hw = c.w / 2, hh = c.h / 2;
        if (mx >= c.sx - hw && mx <= c.sx + hw && my >= c.sy - hh && my <= c.sy + hh) {
          openLightbox(items[c.idx]);
          break;
        }
      }
    });

    // View modes
    document.querySelectorAll('.view-modes button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.view-modes .active').classList.remove('active');
        btn.classList.add('active');
        currentMode = btn.dataset.mode;

        if (currentMode === 'gallery') {
          galleryOverlay.classList.add('active');
        } else {
          galleryOverlay.classList.remove('active');
          targetTiltX = MODE_TILT[currentMode].x;
        }
      });
    });

    // Gallery grid
    items.forEach((item) => {
      const gi = document.createElement('div');
      gi.className = 'gallery-item';
      if (item.src) {
        gi.innerHTML = `<img src="${item.src}" alt="${item.title}" loading="lazy">`;
      } else {
        gi.innerHTML = `<div class="placeholder"><div class="placeholder-icon">+</div><span>${item.title}</span></div>`;
      }
      gi.addEventListener('click', () => openLightbox(item));
      galleryGrid.appendChild(gi);
    });

    // Lightbox
    function openLightbox(item) {
      if (!item.src) return;
      lightboxImg.src = item.src;
      lightbox.classList.add('active');
    }
    function closeLightbox() {
      lightbox.classList.remove('active');
    }
    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

    // Last timestamp for delta time
    let lastTime = performance.now();

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05); // seconds, capped
      lastTime = now;

      const W = window.innerWidth;
      const H = window.innerHeight;
      const cx = W / 2;
      const cy = H / 2;

      // Auto-spin — pauses on hover
      if (!isHovering) {
        spinAngle += SPIN_SPEED * dt;
      }

      // Add scroll velocity
      spinAngle += scrollVel;
      scrollVel *= 0.92; // friction

      // Smooth tilt transition
      currentTiltX += (targetTiltX - currentTiltX) * 0.06;

      // Clear
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.clearRect(0, 0, W, H);

      if (currentMode === 'gallery') {
        requestAnimationFrame(animate);
        return;
      }

      // Compute card positions
      const cards = [];
      for (let i = 0; i < N; i++) {
        const angle = (360 / N) * i + spinAngle;

        // Position on the ring (in XZ plane)
        let p = {
          x: Math.cos(angle * RAD) * RING_RADIUS,
          y: 0,
          z: Math.sin(angle * RAD) * RING_RADIUS
        };

        // Tilt the ring around X axis
        p = rotateX(p, currentTiltX);

        // Project to screen
        const proj = project(p, cx, cy);

        // Card size with perspective
        const cardW = CARD_W * proj.scale;
        const cardH = CARD_H * proj.scale;

        // Push effect: if hovering, push cards away from cursor
        let pushX = 0, pushY = 0;
        if (isHovering) {
          const dx = proj.sx - mouseX;
          const dy = proj.sy - mouseY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < PUSH_RADIUS && dist > 0) {
            const force = (1 - dist / PUSH_RADIUS) * PUSH_STRENGTH;
            pushX = (dx / dist) * force;
            pushY = (dy / dist) * force;
          }
        }

        cards.push({
          idx: i,
          sx: proj.sx + pushX,
          sy: proj.sy + pushY,
          w: cardW,
          h: cardH,
          scale: proj.scale,
          z: p.z,
          angle: angle
        });
      }

      // Sort back to front (higher z = further back)
      cards.sort((a, b) => a.z - b.z);

      // Store for click detection
      projectedCards = cards;

      // Draw cards
      for (const card of cards) {
        const x = card.sx - card.w / 2;
        const y = card.sy - card.h / 2;

        // Depth-based opacity
        const depthNorm = (card.z + RING_RADIUS) / (2 * RING_RADIUS); // 0 (front) to 1 (back)
        const alpha = 1.0 - depthNorm * 0.45; // front: 1.0, back: 0.55

        ctx.save();
        ctx.globalAlpha = alpha;

        // Shadow — stronger for front cards
        const shadowAlpha = 0.06 + (1 - depthNorm) * 0.1;
        ctx.shadowColor = `rgba(0,0,0,${shadowAlpha})`;
        ctx.shadowBlur = 15 * card.scale;
        ctx.shadowOffsetX = 2 * card.scale;
        ctx.shadowOffsetY = 6 * card.scale;

        // White card background
        roundRect(x, y, card.w, card.h, CARD_R * card.scale);
        ctx.fillStyle = '#fff';
        ctx.fill();

        // Reset shadow for image
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;

        // Clip and draw image
        ctx.save();
        roundRect(x, y, card.w, card.h, CARD_R * card.scale);
        ctx.clip();

        const img = loadedImages[card.idx];
        if (img && img.complete && img.naturalWidth > 0) {
          // Cover fit
          const imgR = img.naturalWidth / img.naturalHeight;
          const cardR = card.w / card.h;
          let sw, sh, sx, sy;
          if (imgR > cardR) {
            sh = img.naturalHeight;
            sw = sh * cardR;
            sx = (img.naturalWidth - sw) / 2;
            sy = 0;
          } else {
            sw = img.naturalWidth;
            sh = sw / cardR;
            sx = 0;
            sy = (img.naturalHeight - sh) / 2;
          }
          ctx.drawImage(img, sx, sy, sw, sh, x, y, card.w, card.h);
        } else {
          // Placeholder
          ctx.fillStyle = '#f0f0f0';
          ctx.fill();
          ctx.fillStyle = '#ccc';
          ctx.font = `${Math.round(10 * card.scale)}px Inter, sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(items[card.idx].title, card.sx, card.sy + 10 * card.scale);

          // Plus icon
          ctx.strokeStyle = '#ccc';
          ctx.lineWidth = 1.5 * card.scale;
          const s = 12 * card.scale;
          ctx.beginPath();
          ctx.moveTo(card.sx - s / 2, card.sy - 6 * card.scale);
          ctx.lineTo(card.sx + s / 2, card.sy - 6 * card.scale);
          ctx.moveTo(card.sx, card.sy - 6 * card.scale - s / 2);
          ctx.lineTo(card.sx, card.sy - 6 * card.scale + s / 2);
          ctx.stroke();
        }

        ctx.restore(); // clip
        ctx.restore(); // alpha + shadow
      }

      // Update counter — front-most card
      const front = cards[cards.length - 1];
      if (front) {
        const disp = String(front.idx + 1).padStart(2, '0');
        counterEl.textContent = `${disp} — ${String(N).padStart(2, '0')}`;
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
