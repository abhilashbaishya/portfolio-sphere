<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abhilash Baishya — Portfolio</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Geist Mono', monospace;
      background: #0e0e0e;
      color: #f0f0f0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
      -webkit-user-select: none;
    }

    .header {
      position: fixed;
      top: 40px;
      left: 50px;
      z-index: 10;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 600px) {
      .header { top: 28px; left: 24px; font-size: 11px; }
      .view-modes { top: 24px; }
      .view-modes button { padding: 6px 14px; font-size: 11px; }
      .footer { bottom: 28px; left: 24px; font-size: 10px; }
      .counter { bottom: 28px; right: 24px; font-size: 11px; }
      .lightbox-nav { display: none; }
      .lightbox-close { top: 20px; right: 20px; }
      .lightbox-counter { bottom: 20px; }
    }

    .view-modes {
      position: fixed;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
      z-index: 10;
      background: rgba(255,255,255,0.05);
      padding: 3px;
      border-radius: 24px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .view-modes-pill {
      position: absolute;
      top: 3px;
      left: 0;
      height: calc(100% - 6px);
      border-radius: 22px;
      background: rgba(255,255,255,0.14);
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1), width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 0;
    }

    .view-modes button {
      padding: 6px 16px;
      border-radius: 22px;
      border: none;
      background: transparent;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.25s ease;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
      position: relative;
      z-index: 1;
    }

    .view-modes button.active {
      color: #fff;
    }

    .view-modes button:hover:not(.active) {
      color: rgba(255,255,255,0.8);
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    .footer {
      position: fixed;
      bottom: 40px;
      left: 50px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      z-index: 10;
    }

    .counter {
      position: fixed;
      bottom: 40px;
      right: 50px;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      z-index: 10;
      font-variant-numeric: tabular-nums;
    }

    .auto-toggle {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.2s;
      z-index: 10;
    }
    .auto-toggle:hover { background: rgba(255,255,255,0.12); }

    /* Grid mode — uses canvas, no separate container needed */

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .lightbox.active { display: flex; opacity: 1; }
    .lightbox img {
      max-width: 80vw;
      max-height: 80vh;
      border-radius: 0;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      transition: opacity 0.2s ease;
    }
    .lightbox-close {
      position: absolute;
      top: 30px; right: 40px;
      color: #fff; font-size: 24px;
      cursor: pointer; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      transition: background 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.16); }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      cursor: pointer;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      font-size: 18px;
      transition: background 0.2s;
      user-select: none;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.16); }
    .lightbox-nav.prev { left: 30px; }
    .lightbox-nav.next { right: 30px; }
    .lightbox-counter {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }

  </style>
</head>
<body>

  <div class="header">Abhilash Baishya</div>

  <div class="view-modes" id="viewModes">
    <div class="view-modes-pill" id="viewPill"></div>
    <button data-mode="flat">Flat</button>
    <button class="active" data-mode="ring">Ring</button>
    <button data-mode="grid">Grid</button>
  </div>

  <canvas id="canvas"></canvas>

  <div class="footer" id="footer">Scroll to explore</div>
  <div class="counter" id="counter">01 — 12</div>
  <div class="auto-toggle" id="autoToggle" title="Toggle auto-rotate">
    <svg id="autoIcon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="3,1 12,7 3,13" fill="white" opacity="0.5"/>
    </svg>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="2" y1="2" x2="10" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="10" y1="2" x2="2" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="lightbox-nav prev" id="lightboxPrev">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="6" x2="2" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <polyline points="5,2 1,6 5,10" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-nav next" id="lightboxNext">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="2" y1="6" x2="10" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <polyline points="7,2 11,6 7,10" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>

  <script>
    // =============================================
    // CONFIGURATION — Add your images here
    // =============================================
    const items = [
      { src: 'images/01.webp', title: 'Project 01' },
      { src: 'images/02.webp', title: 'Project 02' },
      { src: 'images/03.webp', title: 'Project 03' },
      { src: 'images/04.webp', title: 'Project 04' },
      { src: 'images/05.webp', title: 'Project 05' },
      { src: 'images/06.webp', title: 'Project 06' },
      { src: 'images/07.webp', title: 'Project 07' },
      { src: 'images/08.webp', title: 'Project 08' },
      { src: 'images/09.webp', title: 'Project 09' },
      { src: 'images/10.webp', title: 'Project 10' },
      { src: 'images/11.webp', title: 'Project 11' },
      { src: 'images/12.webp', title: 'Project 12' },
    ];
    // =============================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const counterEl = document.getElementById('counter');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');
    const lightboxPrev = document.getElementById('lightboxPrev');
    const lightboxNext = document.getElementById('lightboxNext');
    const lightboxCounter = document.getElementById('lightboxCounter');
    const footerEl = document.getElementById('footer');

    let lightboxIndex = -1;
    let isGridMode = false;

    const N = items.length;
    const DPR = window.devicePixelRatio || 1;

    // Card dimensions
    const CARD_W = 140;
    const CARD_H = 175;
    const CARD_R = 0;

    // Rive-matched parameters
    const PERSP_DIST = 1549;
    const SPIN_SPEED = 10; // degrees per second

    // Ring radius — fills most of the viewport
    let RING_RADIUS = 0;

    // Mode tilt angles (degrees around X axis)
    // -90 = face-on circle, 0 = edge-on line
    const MODE_TILT = {
      flat:  { x: -80 },   // near face-on circle
      ring:  { x: -40 },   // tilted diagonal ellipse
    };

    let currentMode = 'ring';
    let currentTiltX = -40;
    let targetTiltX = -40;

    // Spin angle (Y rotation of the ring)
    let spinAngle = 0; // degrees

    // Smooth z-values for each card (interpolated to avoid snap reordering)
    const smoothZ = new Array(N).fill(0);

    // Auto-rotate state
    let autoRotate = true;
    const autoToggle = document.getElementById('autoToggle');
    const autoIcon = document.getElementById('autoIcon');
    function updateAutoIcon() {
      if (autoRotate) {
        autoIcon.innerHTML = '<rect x="3" y="2" width="3" height="10" rx="0.5" fill="white" opacity="0.5"/><rect x="8" y="2" width="3" height="10" rx="0.5" fill="white" opacity="0.5"/>';
      } else {
        autoIcon.innerHTML = '<polygon points="3,1 12,7 3,13" fill="white" opacity="0.5"/>';
      }
    }
    autoToggle.addEventListener('click', () => {
      autoRotate = !autoRotate;
      updateAutoIcon();
    });
    updateAutoIcon();

    // Mouse state
    let mouseX = -9999, mouseY = -9999;
    let isHovering = false;      // mouse is on canvas
    let isHoveringCard = false;  // mouse is over a card

    let gridReady = false;

    // Image loading
    const loadedImages = [];
    items.forEach((item, i) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = item.src;
      loadedImages[i] = img;
    });

    // Resize
    function resize() {
      canvas.width = window.innerWidth * DPR;
      canvas.height = window.innerHeight * DPR;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      RING_RADIUS = Math.min(window.innerWidth, window.innerHeight) * 0.4;
      if (gridReady) computeGridSlots();
    }
    resize();
    window.addEventListener('resize', resize);

    // Deg to rad
    const RAD = Math.PI / 180;

    // 3D helpers
    function rotateX(p, deg) {
      const c = Math.cos(deg * RAD), s = Math.sin(deg * RAD);
      return { x: p.x, y: p.y * c - p.z * s, z: p.y * s + p.z * c };
    }

    function rotateY(p, deg) {
      const c = Math.cos(deg * RAD), s = Math.sin(deg * RAD);
      return { x: p.x * c + p.z * s, y: p.y, z: -p.x * s + p.z * c };
    }

    // Perspective project
    function project(p, cx, cy) {
      const scale = PERSP_DIST / (PERSP_DIST + p.z);
      return {
        sx: cx + p.x * scale,
        sy: cy + p.y * scale,
        scale: scale,
        z: p.z
      };
    }

    // Draw rounded rect path
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    // Scroll interaction
    let scrollVel = 0;
    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (isGridMode) {
        gridScrollVel -= e.deltaY * 0.5;
      } else {
        scrollVel -= e.deltaY * 0.02;
      }
    }, { passive: false });

    // Touch detection
    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if (isTouch) document.getElementById('footer').textContent = 'Swipe to explore';

    // Touch spin + tap
    let touchStartX = 0, touchStartY = 0, touchLastX = 0;
    let touchMoved = false;
    let touchSpinResumeTimer = null;
    let isTouchSpinning = false;

    canvas.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      touchStartX = touchLastX = t.clientX;
      touchStartY = touchLastY = t.clientY;
      touchMoved = false;
      isTouchSpinning = true;
      clearTimeout(touchSpinResumeTimer);
    }, { passive: true });

    let touchLastY = 0;
    canvas.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      const dx = t.clientX - touchLastX;
      const dy = t.clientY - touchLastY;
      if (isGridMode) {
        gridScrollVel += dy * 1.2;
      } else {
        scrollVel += dx * 0.15;
      }
      touchLastX = t.clientX;
      touchLastY = t.clientY;
      if (Math.abs(t.clientX - touchStartX) > 8 || Math.abs(t.clientY - touchStartY) > 8) {
        touchMoved = true;
      }
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
      if (!touchMoved) {
        // Treat as tap — find tapped card
        const mx = touchStartX, my = touchStartY;
        for (let i = projectedCards.length - 1; i >= 0; i--) {
          const c = projectedCards[i];
          const hw = c.w / 2, hh = c.h / 2;
          if (mx >= c.sx - hw && mx <= c.sx + hw && my >= c.sy - hh && my <= c.sy + hh) {
            openLightbox(c.idx);
            break;
          }
        }
      }
      // Resume auto-spin after 2s idle
      touchSpinResumeTimer = setTimeout(() => { isTouchSpinning = false; }, 2000);
    }, { passive: true });

    // Lightbox swipe (prev/next or close)
    let lbTouchStartX = 0, lbTouchStartY = 0;
    lightbox.addEventListener('touchstart', (e) => {
      lbTouchStartX = e.touches[0].clientX;
      lbTouchStartY = e.touches[0].clientY;
    }, { passive: true });
    lightbox.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - lbTouchStartX;
      const dy = e.changedTouches[0].clientY - lbTouchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        lightboxStep(dx < 0 ? 1 : -1);
      } else if (Math.abs(dy) > 80 && Math.abs(dy) > Math.abs(dx)) {
        closeLightbox();
      }
    }, { passive: true });

    // Mouse tracking
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      isHovering = true;
    });

    canvas.addEventListener('mouseleave', () => {
      isHovering = false;
      mouseX = -9999;
      mouseY = -9999;
    });

    // Click detection — first click both pauses spin and opens card
    let projectedCards = [];
    canvas.addEventListener('mousedown', () => {
      // Immediately kill scroll velocity on click so card doesn't drift
      scrollVel = 0;
    });
    canvas.addEventListener('click', (e) => {
      const mx = e.clientX, my = e.clientY;
      for (let i = projectedCards.length - 1; i >= 0; i--) {
        const c = projectedCards[i];
        const hw = c.w / 2, hh = c.h / 2;
        if (mx >= c.sx - hw && mx <= c.sx + hw && my >= c.sy - hh && my <= c.sy + hh) {
          openLightbox(c.idx);
          break;
        }
      }
    });

    // Grid layout — scattered editorial positions like Waabi reference
    // Images placed at irregular positions with dramatic size variation and whitespace
    const gridSlots = [];
    const gridDrift = items.map((_, i) => ({
      phase: Math.random() * Math.PI * 2,
      ampX: 10 + Math.random() * 20,
      ampY: 12 + Math.random() * 25,
      freqX: 0.4 + Math.random() * 0.5,
      freqY: 0.3 + Math.random() * 0.4,
    }));

    let gridScrollY = 0;
    let gridScrollVel = 0;

    // Scattered layout — smaller sizes, positions as fractions of viewport
    // Images are placed in "rows" that tile vertically for infinite scroll
    const scatterMap = [
      { xf: -0.01, yf: 0.06, sf: 0.10 },
      { xf: 0.18,  yf: 0.02, sf: 0.07 },
      { xf: 0.42,  yf: 0.08, sf: 0.12 },
      { xf: 0.68,  yf: 0.01, sf: 0.08 },
      { xf: 0.88,  yf: 0.06, sf: 0.11 },
      { xf: 0.06,  yf: 0.30, sf: 0.08 },
      { xf: 0.26,  yf: 0.26, sf: 0.11 },
      { xf: 0.52,  yf: 0.32, sf: 0.07 },
      { xf: 0.72,  yf: 0.28, sf: 0.10 },
      { xf: 0.02,  yf: 0.55, sf: 0.11 },
      { xf: 0.22,  yf: 0.52, sf: 0.08 },
      { xf: 0.46,  yf: 0.58, sf: 0.09 },
      { xf: 0.65,  yf: 0.54, sf: 0.12 },
      { xf: 0.86,  yf: 0.50, sf: 0.07 },
      { xf: 0.12,  yf: 0.78, sf: 0.09 },
      { xf: 0.36,  yf: 0.82, sf: 0.11 },
      { xf: 0.58,  yf: 0.76, sf: 0.08 },
      { xf: 0.80,  yf: 0.80, sf: 0.10 },
    ];
    // One full "page" height in vh units — images tile every pageH pixels
    let gridPageH = 0;

    function computeGridSlots() {
      gridSlots.length = 0;
      const W = window.innerWidth;
      const H = window.innerHeight;
      gridPageH = H * 1.05; // each page is slightly more than viewport
      for (let i = 0; i < items.length; i++) {
        const s = scatterMap[i % scatterMap.length];
        const w = W * s.sf;
        const h = w;
        const x = W * s.xf;
        const y = gridPageH * s.yf;
        gridSlots.push({ x, y, w, h, idx: i });
      }
    }
    computeGridSlots();
    gridReady = true;

    // Sliding pill indicator
    const viewPill = document.getElementById('viewPill');
    const viewModesEl = document.getElementById('viewModes');
    function updatePill(btn) {
      const containerRect = viewModesEl.getBoundingClientRect();
      const btnRect = btn.getBoundingClientRect();
      viewPill.style.left = (btnRect.left - containerRect.left) + 'px';
      viewPill.style.width = btnRect.width + 'px';
    }
    // Position pill on initial active button
    requestAnimationFrame(() => {
      const activeBtn = document.querySelector('.view-modes button.active');
      if (activeBtn) {
        viewPill.style.transition = 'none';
        updatePill(activeBtn);
        // Re-enable transition after initial position
        requestAnimationFrame(() => { viewPill.style.transition = ''; });
      }
    });

    // View modes
    document.querySelectorAll('.view-modes button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.view-modes .active').classList.remove('active');
        btn.classList.add('active');
        updatePill(btn);
        currentMode = btn.dataset.mode;
        isGridMode = currentMode === 'grid';

        if (isGridMode) {
          gridScrollY = 0;
          gridScrollVel = 0;
          computeGridSlots();
          counterEl.style.display = 'none';
          footerEl.style.display = 'none';
          autoToggle.style.display = 'none';
        } else {
          counterEl.style.display = 'block';
          footerEl.style.display = 'block';
          autoToggle.style.display = 'flex';
          targetTiltX = MODE_TILT[currentMode].x;
        }
      });
    });

    // Lightbox
    function openLightbox(idx) {
      lightboxIndex = idx;
      lightboxImg.src = items[idx].src;
      lightboxCounter.textContent = `${String(idx + 1).padStart(2, '0')} / ${String(N).padStart(2, '0')}`;
      lightbox.classList.add('active');
    }
    function lightboxStep(dir) {
      lightboxIndex = (lightboxIndex + dir + N) % N;
      lightboxImg.style.opacity = '0';
      setTimeout(() => {
        lightboxImg.src = items[lightboxIndex].src;
        lightboxCounter.textContent = `${String(lightboxIndex + 1).padStart(2, '0')} / ${String(N).padStart(2, '0')}`;
        lightboxImg.style.opacity = '1';
      }, 150);
    }
    function closeLightbox() {
      lightbox.classList.remove('active');
    }
    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', () => lightboxStep(-1));
    lightboxNext.addEventListener('click', () => lightboxStep(1));
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', (e) => {
      if (lightbox.classList.contains('active')) {
        if (e.key === 'Escape') closeLightbox();
        else if (e.key === 'ArrowLeft') lightboxStep(-1);
        else if (e.key === 'ArrowRight') lightboxStep(1);
        return;
      }
      // Carousel keyboard nav
      if (e.key === 'ArrowLeft') scrollVel += 3;
      if (e.key === 'ArrowRight') scrollVel -= 3;
      if (e.key === 'Enter' || e.key === ' ') {
        // Open front-most card
        if (projectedCards.length) {
          const front = projectedCards[projectedCards.length - 1];
          openLightbox(front.idx);
        }
      }
    });

    // Last timestamp for delta time
    let lastTime = performance.now();

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05); // seconds, capped
      lastTime = now;

      const W = window.innerWidth;
      const H = window.innerHeight;
      const cx = W / 2;
      const cy = H / 2;

      // Clear
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.clearRect(0, 0, W, H);

      if (isGridMode) {
        // ===== GRID MODE — infinite scattered floating tiles =====
        gridScrollY += gridScrollVel;
        gridScrollVel *= 0.94;

        // Wrap scroll for infinite loop
        if (gridPageH > 0) {
          gridScrollY = ((gridScrollY % gridPageH) + gridPageH) % gridPageH;
        }

        const time = now / 1000;
        const gridCards = [];

        // Render current page and one above/below for seamless tiling
        for (let page = -1; page <= 1; page++) {
          const pageOff = page * gridPageH;
          for (let i = 0; i < gridSlots.length; i++) {
            const slot = gridSlots[i];
            const d = gridDrift[i];
            const driftX = Math.sin(time * d.freqX + d.phase) * d.ampX;
            const driftY = Math.cos(time * d.freqY + d.phase * 1.3) * d.ampY;
            const drawY = slot.y + driftY + gridScrollY + pageOff;
            // Only include if potentially visible
            if (drawY + slot.h < -60 || drawY > H + 60) continue;
            gridCards.push({
              idx: slot.idx,
              x: slot.x + driftX,
              y: drawY,
              w: slot.w,
              h: slot.h,
              srcIdx: i,
            });
          }
        }

        // Hover detection for grid
        let gridHoveredIdx = -1;
        if (isHovering && !isTouch) {
          for (let i = gridCards.length - 1; i >= 0; i--) {
            const c = gridCards[i];
            if (mouseX >= c.x && mouseX <= c.x + c.w && mouseY >= c.y && mouseY <= c.y + c.h) {
              gridHoveredIdx = i;
              break;
            }
          }
        }
        isHoveringCard = gridHoveredIdx !== -1;

        // Store for click detection
        projectedCards = gridCards.map(c => ({
          idx: c.idx,
          sx: c.x + c.w / 2,
          sy: c.y + c.h / 2,
          w: c.w,
          h: c.h,
        }));

        for (let i = 0; i < gridCards.length; i++) {
          const c = gridCards[i];
          const isHovered = i === gridHoveredIdx;
          const sm = isHovered ? 1.03 : 1.0;
          const w = c.w * sm;
          const h = c.h * sm;
          const x = c.x + (c.w - w) / 2;
          const y = c.y + (c.h - h) / 2;

          let alpha = 1.0;

          ctx.save();
          ctx.globalAlpha = alpha;

          ctx.shadowColor = `rgba(0,0,0,${isHovered ? 0.6 : 0.25})`;
          ctx.shadowBlur = isHovered ? 24 : 12;
          ctx.shadowOffsetY = isHovered ? 8 : 3;

          ctx.beginPath();
          ctx.rect(x, y, w, h);
          ctx.fillStyle = '#1a1a1a';
          ctx.fill();

          ctx.strokeStyle = isHovered ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)';
          ctx.lineWidth = 1;
          ctx.stroke();

          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
          ctx.shadowOffsetY = 0;

          ctx.save();
          ctx.beginPath();
          ctx.rect(x, y, w, h);
          ctx.clip();

          const img = loadedImages[c.idx];
          if (img && img.complete && img.naturalWidth > 0) {
            const imgR = img.naturalWidth / img.naturalHeight;
            const cardR = w / h;
            let sw, sh, sx, sy;
            if (imgR > cardR) {
              sh = img.naturalHeight;
              sw = sh * cardR;
              sx = (img.naturalWidth - sw) / 2;
              sy = 0;
            } else {
              sw = img.naturalWidth;
              sh = sw / cardR;
              sx = 0;
              sy = (img.naturalHeight - sh) / 2;
            }
            ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
          } else {
            ctx.fillStyle = '#222';
            ctx.fillRect(x, y, w, h);
          }

          ctx.restore(); // clip
          ctx.restore(); // alpha
        }

        canvas.style.cursor = isHoveringCard ? 'pointer' : 'default';

      } else {
        // ===== RING / FLAT / TILT MODE =====

        // Auto-spin — pauses when hovering a card (desktop) or actively swiping (touch)
        if (autoRotate && !isHoveringCard && !isTouchSpinning) {
          spinAngle += SPIN_SPEED * dt;
        }

        // Add scroll velocity
        spinAngle += scrollVel;
        scrollVel *= 0.96;

        // Smooth tilt transition
        currentTiltX += (targetTiltX - currentTiltX) * 0.08;

        // Compute card positions
        const cards = [];
        for (let i = 0; i < N; i++) {
          const angle = (360 / N) * i + spinAngle;

          let p = {
            x: Math.cos(angle * RAD) * RING_RADIUS,
            y: 0,
            z: Math.sin(angle * RAD) * RING_RADIUS
          };

          p = rotateX(p, currentTiltX);
          const proj = project(p, cx, cy);
          const cardW = CARD_W * proj.scale;
          const cardH = CARD_H * proj.scale;

          // Smooth z interpolation — prevents snap reordering
          smoothZ[i] += (p.z - smoothZ[i]) * 0.15;

          cards.push({
            idx: i,
            sx: proj.sx,
            sy: proj.sy,
            w: cardW,
            h: cardH,
            scale: proj.scale,
            z: p.z,
            smoothZ: smoothZ[i],
            angle: angle
          });
        }

        cards.sort((a, b) => a.smoothZ - b.smoothZ);
        projectedCards = cards;

        // Determine which card is hovered — desktop only
        let hoveredIdx = -1;
        if (isHovering && !isTouch) {
          for (let i = cards.length - 1; i >= 0; i--) {
            const c = cards[i];
            const hw = c.w / 2, hh = c.h / 2;
            if (mouseX >= c.sx - hw && mouseX <= c.sx + hw && mouseY >= c.sy - hh && mouseY <= c.sy + hh) {
              hoveredIdx = i;
              break;
            }
          }
        }
        isHoveringCard = hoveredIdx !== -1;

        // Draw cards
        for (let ci = 0; ci < cards.length; ci++) {
          const card = cards[ci];
          const isHovered = ci === hoveredIdx;

          const scaleMult = isHovered ? 1.04 : 1.0;
          const w = card.w * scaleMult;
          const h = card.h * scaleMult;
          const x = card.sx - w / 2;
          const y = card.sy - h / 2;

          const depthNorm = (card.z + RING_RADIUS) / (2 * RING_RADIUS);
          let alpha = 1.0 - depthNorm * 0.55;

          if (hoveredIdx !== -1 && !isHovered) {
            alpha *= 0.35;
          }

          ctx.save();
          ctx.globalAlpha = alpha;

          const shadowAlpha = isHovered ? 0.7 : 0.3 + (1 - depthNorm) * 0.4;
          ctx.shadowColor = `rgba(0,0,0,${shadowAlpha})`;
          ctx.shadowBlur = isHovered ? 40 * card.scale : 24 * card.scale;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = isHovered ? 16 * card.scale : 8 * card.scale;

          roundRect(x, y, w, h, CARD_R * card.scale);
          ctx.fillStyle = '#1a1a1a';
          ctx.fill();

          ctx.strokeStyle = isHovered
            ? `rgba(255,255,255,0.18)`
            : `rgba(255,255,255,${0.04 + (1 - depthNorm) * 0.06})`;
          ctx.lineWidth = 1;
          ctx.stroke();

          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 0;

          ctx.save();
          roundRect(x, y, w, h, CARD_R * card.scale);
          ctx.clip();

          const img = loadedImages[card.idx];
          if (img && img.complete && img.naturalWidth > 0) {
            const imgR = img.naturalWidth / img.naturalHeight;
            const cardR = w / h;
            let sw, sh, sx, sy;
            if (imgR > cardR) {
              sh = img.naturalHeight;
              sw = sh * cardR;
              sx = (img.naturalWidth - sw) / 2;
              sy = 0;
            } else {
              sw = img.naturalWidth;
              sh = sw / cardR;
              sx = 0;
              sy = (img.naturalHeight - sh) / 2;
            }
            ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
          } else {
            ctx.fillStyle = '#222';
            ctx.fill();
            ctx.fillStyle = '#555';
            ctx.font = `${Math.round(10 * card.scale)}px Geist Mono, monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(items[card.idx].title, card.sx, card.sy + 10 * card.scale * scaleMult);

            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1.5 * card.scale;
            const s = 12 * card.scale;
            ctx.beginPath();
            ctx.moveTo(card.sx - s / 2, card.sy - 6 * card.scale);
            ctx.lineTo(card.sx + s / 2, card.sy - 6 * card.scale);
            ctx.moveTo(card.sx, card.sy - 6 * card.scale - s / 2);
            ctx.lineTo(card.sx, card.sy - 6 * card.scale + s / 2);
            ctx.stroke();
          }

          ctx.restore(); // clip
          ctx.restore(); // alpha + shadow
        }

        canvas.style.cursor = isHoveringCard ? 'pointer' : 'default';

        // Update counter — front-most card
        const front = cards[cards.length - 1];
        if (front) {
          const disp = String(front.idx + 1).padStart(2, '0');
          counterEl.textContent = `${disp} — ${String(N).padStart(2, '0')}`;
        }
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
